<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuessTheNumber</title>
    <link rel="stylesheet" href="game.css">
<script src="game.js" defer></script>
</head>

<body>
    <header>
        <button class="again">Again</button>
    <h1>Guess The Number</h1>
    <p class="between">Between 1 to 20</p>
    <div class="number">
        <h1>?</h1></div>
    </header>
    <main>
        <section class="left">
   
    <input type="number"   id="guess-input"/><br>   <button class="btn-check">Check</button>
        </section>
        <section class="right">
         <div class="message">Start guessing...</div>
    <div class="score">Score: <span class="score1">0</span></div>
    <div class="highscore">HighScore: <span class="highscore1">0</span></div>
    </section>
    </main>
</body>
</html>
